name: Canary

# Monthly: run the newest OpenRocket release against the newest checked-in
# profile (nearest-older fallback). Catches upstream drift between releases
# of orlab; failure opens a tracked issue.
#
# Two jobs on purpose: the job that executes the untrusted upstream jar runs
# with a read-only token (and the jar-executing step gets no token at all);
# only the issue-filing job holds issues:write.

on:
  schedule:
    - cron: "17 5 3 * *"
  workflow_dispatch:

jobs:
  canary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Fetch newest OpenRocket release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh api repos/openrocket/openrocket/releases/latest --jq .tag_name)
          VERSION=${TAG#release-}
          echo "Newest OpenRocket release: $VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          curl -sSfL --retry 3 -o "OpenRocket-$VERSION.jar" \
            "https://github.com/openrocket/openrocket/releases/download/$TAG/OpenRocket-$VERSION.jar"

      - name: Run it against current profiles
        # no token in this step's env: it executes the downloaded jar.
        # bash -> pipefail, so a case failing after its RESULT line still
        # fails the step despite the tee
        shell: bash
        run: |
          uv sync
          uv run python tests/integration/cases/happy.py "OpenRocket-$VERSION.jar" | tee canary.out
          grep '^RESULT ' canary.out | sed 's/^RESULT //' > result.json
          python3 - <<'EOF'
          import json

          result = json.load(open("result.json"))
          assert result["apogee"] > 10, result
          assert {"LAUNCH", "APOGEE", "GROUND_HIT"} <= set(result["events"]), result
          if result["extra_types"] or result["extra_events"]:
              print(
                  "NOTE: jar exposes constants beyond the fallback profile "
                  f"(regeneration due): {result['extra_types']} {result['extra_events']}"
              )
          print("CANARY OK:", result["version"], "apogee", result["apogee"])
          EOF
          uv run python tests/integration/cases/summary.py "OpenRocket-$VERSION.jar" | tee summary.out
          grep '^RESULT ' summary.out | sed 's/^RESULT //' > summary.json
          python3 - <<'EOF'
          import math
          import json

          calm = json.load(open("summary.json"))["calm"]
          # coarse bands: this runs against unknown future releases
          assert 10 < calm["apogee"] < 200, calm
          assert not math.isnan(calm["min_stability_cal"]), calm
          assert -2 < calm["min_stability_cal"] < 10, calm
          assert not math.isnan(calm["descent_rate"]), calm
          assert calm["landing_distance"] < 5, calm
          print("CANARY summary OK: apogee", calm["apogee"])
          EOF
          uv run python tests/integration/cases/declarative_keys.py "OpenRocket-$VERSION.jar" | tee decl.out
          grep '^RESULT ' decl.out | sed 's/^RESULT //' > decl.json
          python3 - <<'EOF'
          import json

          result = json.load(open("decl.json"))
          for key, applied in result["applied"].items():
              got = result["readback"][key]
              assert abs(got - applied) < 1e-9 if isinstance(applied, float) else got == applied, (key, applied, got)
          assert result["readback"]["random_seed"] == 123456789, result
          assert result["apogee"] > 10, result
          print("CANARY declarative OK")
          EOF
          uv run python tests/integration/cases/motor_swap.py "OpenRocket-$VERSION.jar" | tee motor.out
          grep '^RESULT ' motor.out | sed 's/^RESULT //' > motor.json
          python3 - <<'EOF'
          import json

          result = json.load(open("motor.json"))
          assert result["initial"] == "A8", result
          assert result["c6"]["designation"] == "C6", result
          assert result["c6"]["apogee"] > result["stock_apogee"] * 2, result
          assert result["eng"]["designation"] == "ORLAB45", result
          print("CANARY motor OK")
          EOF
          uv run python tests/integration/cases/wind_profile.py "OpenRocket-$VERSION.jar" | tee wind.out
          grep '^RESULT ' wind.out | sed 's/^RESULT //' > wind.json
          python3 - <<'EOF'
          import json

          result = json.load(open("wind.json"))
          assert abs(result["low_mean"] - 5.0) < 0.2, result
          assert abs(result["high_mean"] - 20.0) < 0.5, result
          assert 240 < result["east_bearing"] < 300, result
          print("CANARY wind OK")
          EOF

  file-issue:
    runs-on: ubuntu-latest
    needs: canary
    if: failure()
    permissions:
      issues: write
    steps:
      - name: Open an issue on failure
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ -z "$(gh issue list --label canary --state open --json number --jq '.[0]')" ]; then
            gh issue create --label canary \
              --title "canary: newest OpenRocket release fails against current profiles" \
              --body "The monthly canary run failed: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID — likely upstream drift requiring a profile regeneration (tools/generate_profile.py) or a contract fix."
          fi
