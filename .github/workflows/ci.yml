name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Install just
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2

      - name: Check (format, lint, types)
        run: just check

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # 3.10 enforces the requires-python floor (mypy only checks the dev
        # interpreter). The windows cell is the only automated check of the
        # spawn/pickle/path/file-handling code on a platform the README
        # claims; the jar-free unit suite needs no JDK or compiler there.
        os: [ubuntu-latest]
        python-version: ["3.10", "3.14"]
        include:
          - os: windows-latest
            python-version: "3.14"
          - os: ubuntu-latest
            python-version: "3.14"
            extras: true
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Run unit tests
        # bash on all platforms: pwsh would not fail the step on a mid-script
        # `uv sync` error
        shell: bash
        run: |
          uv sync
          uv run pytest -q

      - name: Tabular export against a real orlab[pandas] install
        # the extras-flagged cell installs the built package with the extra;
        # pandas stays out of every other environment on purpose. The flag
        # lives in the matrix so dropping the cell is visible, not a silent
        # skip-forever.
        if: matrix.extras
        shell: bash
        run: |
          uv venv extra-venv
          VIRTUAL_ENV="$PWD/extra-venv" uv pip install '.[pandas]' pytest
          extra-venv/bin/python -m pytest -q tests/test_tabular.py

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # tested tier: every profiled OpenRocket version on both supported JDKs
        or-version: ["15.03", "22.02", "23.09", "24.12"]
        java-version: ["17", "21"]
    env:
      ORLAB_TEST_VERSION: ${{ matrix.or-version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Cache OpenRocket jars
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/orlab-jars
          # pin-file hash: a changed sha256 pin must not restore the stale jar
          # (cache entries are immutable per key)
          key: orlab-jars-${{ matrix.or-version }}-${{ hashFiles('src/orlab/_pins.py') }}

      - name: Run integration matrix
        run: |
          uv sync
          uv run pytest -q -m integration tests/integration
